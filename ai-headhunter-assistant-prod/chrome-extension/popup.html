<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI猎头助手 - 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-size: 14px;
      background: #f9fafb;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 20px;
      margin-bottom: 8px;
    }
    
    .header p {
      font-size: 13px;
      opacity: 0.9;
    }
    
    .content {
      padding: 20px;
    }
    
    .section {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 12px;
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    
    .info-row:last-child {
      border-bottom: none;
    }
    
    .info-label {
      color: #6b7280;
      font-size: 13px;
    }
    
    .info-value {
      font-weight: 600;
      color: #1f2937;
      font-size: 13px;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn:hover {
      background: #5568d3;
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: #f3f4f6;
      color: #1f2937;
    }
    
    .btn-secondary:hover {
      background: #e5e7eb;
    }
    
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .status-badge.success {
      background: #d1fae5;
      color: #065f46;
    }
    
    .status-badge.error {
      background: #fee2e2;
      color: #991b1b;
    }
    
    .footer {
      text-align: center;
      padding: 16px;
      color: #9ca3af;
      font-size: 12px;
    }
    
    .link {
      color: #667eea;
      text-decoration: none;
      cursor: pointer;
    }
    
    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 AI猎头助手</h1>
    <p>自动筛选简历，智能评估候选人</p>
  </div>
  
  <div class="content">
    <div class="section">
      <div class="section-title">📊 系统状态</div>
      <div class="info-row">
        <span class="info-label">插件版本</span>
        <span class="info-value">v1.0.0-MVP</span>
      </div>
      <div class="info-row">
        <span class="info-label">后台服务</span>
        <span class="status-badge success">●已连接</span>
      </div>
      <div class="info-row">
        <span class="info-label">AI 服务</span>
        <span class="info-value">通义千问</span>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">🎯 使用说明</div>
      <ol style="color: #6b7280; font-size: 13px; line-height: 1.8; padding-left: 20px;">
        <li>打开 Boss 直聘网站</li>
        <li>进入"推荐牛人"或候选人列表页</li>
        <li>控制面板会自动出现在左下角</li>
        <li>设置处理数量，点击"开始处理"</li>
        <li>等待处理完成，导出 CSV 结果</li>
      </ol>
    </div>
    
    <div class="section">
      <div class="section-title">⚙️ 快捷操作</div>
      <button class="btn" id="btn-open-boss">
        打开 Boss 直聘
      </button>
      <button class="btn btn-secondary" id="btn-open-docs" style="margin-top: 8px;">
        查看文档
      </button>
    </div>
    
    <div class="section">
      <div class="section-title">📝 注意事项</div>
      <ul style="color: #6b7280; font-size: 12px; line-height: 1.8; padding-left: 20px;">
        <li>确保后台服务正常运行</li>
        <li>建议每次处理 10-20 个候选人</li>
        <li>避免频繁操作以防触发风控</li>
        <li>定期导出结果到飞书表格</li>
      </ul>
    </div>
  </div>
  
  <div class="footer">
    <p>© 2025 AI猎头助手 | <a href="#" class="link">GitHub</a></p>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
