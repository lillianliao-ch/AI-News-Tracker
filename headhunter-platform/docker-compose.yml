services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: headhunter-postgres
    environment:
      POSTGRES_DB: headhunter_platform
      POSTGRES_PASSWORD: headhunter_pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U headhunter_user -d headhunter_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - headhunter-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: headhunter-redis
    command: redis-server --appendonly yes --requirepass headhunter_redis_pass
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - headhunter-network

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: headhunter-backend
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://headhunter_user:headhunter_pass@postgres:5432/headhunter_platform
      - REDIS_URL=redis://:headhunter_redis_pass@redis:6379
      - JWT_SECRET=headhunter-jwt-secret-key-for-development
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev
    networks:
      - headhunter-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Web Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: headhunter-frontend
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
      - PORT=3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev
    networks:
      - headhunter-network

  # pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: headhunter-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@headhunter-platform.com
      PGADMIN_DEFAULT_PASSWORD: admin123456
      PGADMIN_LISTEN_PORT: 80
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - headhunter-network

  # Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: headhunter-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379:0:headhunter_redis_pass
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - headhunter-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  headhunter-network:
    driver: bridge