<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>脉脉职位发布助手</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, sans-serif;
    }
    h2 { margin: 0 0 16px 0; font-size: 18px; color: #333; }
    .btn {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn:disabled { background: #ccc; }
    .upload-area {
      border: 2px dashed #ddd;
      padding: 20px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
    }
    #status { margin-top: 10px; font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <h2>脉脉职位发布助手</h2>
  
  <div class="upload-area" id="uploadArea">
    <div>📂 点击上传 Excel 职位表</div>
    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display: none;">
  </div>
  
  <div id="fileInfo" style="margin: 10px 0; font-size: 13px;"></div>

  <button class="btn" id="startBtn" disabled>开始自动填写</button>
  
  <div id="status">请先上传文件，然后进入脉脉发布职位页面。</div>

  <script src="libs/xlsx.full.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
