# =============================================================================
# 同义词配置文件 - Personal AI Headhunter
# =============================================================================
# 
# 📋 使用说明：
# - 每个同义词组包含一个 canonical（标准形式）和多个 aliases（别名）
# - 匹配时，所有别名都会被视为与标准形式等价
# - 修改此文件后，下次匹配时自动生效（无需重启服务）
#
# 📝 维护指南：
# 1. 添加新同义词：在对应分类下添加新条目
# 2. 扩展现有词组：在 aliases 列表中添加新别名
# 3. 验证配置：运行 python scripts/validate_synonyms.py
#
# =============================================================================

