version: 1
description: |
  Standardized candidate profile schema for import from SaaS exports.
  This schema defines canonical fields to improve search and matching.

fields:
  candidate_id:
    type: string
    required: false
    description: Stable external ID from the SaaS. Prefer this as the primary key when available.
  full_name:
    type: string
    required: false
    description: Candidate full name as a single string.
  first_name:
    type: string
    required: false
  last_name:
    type: string
    required: false
  email:
    type: string
    required: false
    description: Primary email address, lowercased.
  phone:
    type: string
    required: false
    description: Primary phone in a normalized format; minimal normalization applied if no country context.
  city:
    type: string
    required: false
  region:
    type: string
    required: false
    description: State/Province/Region when applicable.
  country:
    type: string
    required: false
  location:
    type: string
    required: false
    description: Free-form location as provided by source; used as fallback.
  remote_preference:
    type: string
    enum: [onsite, hybrid, remote, unknown]
    required: false
  current_company:
    type: string
    required: false
  current_title:
    type: string
    required: false
  years_experience:
    type: number
    required: false
  skills:
    type: array
    items: string
    required: false
    description: Canonicalized skill tokens (lowercase, trimmed).
  skills_recent:
    type: array
    items: object
    required: false
    description: Recent skills with last_used metadata when available.
  education:
    type: array
    items: object
    required: false
  languages:
    type: array
    items: string
    required: false
  salary_current:
    type: number
    required: false
  salary_expectation_min:
    type: number
    required: false
  salary_expectation_max:
    type: number
    required: false
  currency:
    type: string
    required: false
  notice_period_days:
    type: integer
    required: false
  available_from_date:
    type: string
    format: date
    required: false
  visa_status:
    type: string
    required: false
  linkedin_url:
    type: string
    required: false
  github_url:
    type: string
    required: false
  resume_url:
    type: string
    required: false
  tags:
    type: array
    items: string
    required: false
  owner:
    type: string
    required: false
    description: Recruiter/consultant owner in your org.
  status:
    type: string
    required: false
    description: Pipeline status from SaaS; not normalized.
  last_activity_at:
    type: string
    format: date-time
    required: false
  last_activity_bucket:
    type: string
    enum: [lt_90d, d90_180, d180_365, gt_365d, unknown]
    required: false
  source:
    type: string
    required: false
  consent_opt_in:
    type: boolean
    required: false
  do_not_contact:
    type: boolean
    required: false
  created_at:
    type: string
    format: date-time
    required: false
  updated_at:
    type: string
    format: date-time
    required: false
  data_confidence_score:
    type: number
    required: false
    description: 0-1 confidence after normalization; heuristic.
  pii_masking_strategy:
    type: string
    required: false
    description: How PII was handled when exporting/sharing.

dedup_strategy:
  primary_keys:
    - candidate_id
  fallbacks:
    - [email]
    - [phone]
    - [full_name, current_company]
  keep: first

notes: |
  - This schema is intentionally permissive; missing fields are allowed.
  - For CSV compatibility, arrays may be emitted as semicolon-separated strings.
  - Parquet output preserves array types where possible.

