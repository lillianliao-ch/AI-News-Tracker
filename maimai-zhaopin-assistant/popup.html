<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脉脉招聘助手</title>
    <style>
        body {
            width: 300px;
            padding: 20px;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8f9fa;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #1890ff;
        }
        
        .title {
            font-size: 18px;
            font-weight: 600;
            color: #1890ff;
            margin: 0 0 8px 0;
        }
        
        .version {
            font-size: 12px;
            color: #666;
            margin: 0;
        }
        
        .info-section {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .info-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .info-text {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
        }
        
        .status {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-online {
            background: #52c41a;
        }
        
        .status-offline {
            background: #ff4d4f;
        }
        
        .button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #1890ff;
            color: white;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 8px;
        }
        
        .button:hover {
            background: #40a9ff;
        }
        
        .button-secondary {
            background: #f5f5f5;
            color: #666;
            border: 1px solid #d9d9d9;
        }
        
        .button-secondary:hover {
            background: #e6f7ff;
            border-color: #1890ff;
            color: #1890ff;
        }
        
        .footer {
            text-align: center;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }
        
        .footer-link {
            color: #1890ff;
            text-decoration: none;
            font-size: 12px;
        }
        
        .footer-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">脉脉招聘助手</h1>
        <p class="version">v1.0.0</p>
    </div>
    
    <div class="info-section">
        <div class="info-title">插件状态</div>
        <div class="status" id="plugin-status">
            <div class="status-dot status-offline"></div>
            <span>检测中...</span>
        </div>
        <div class="info-text">
            请访问脉脉网站使用此插件
        </div>
    </div>
    
    <div class="info-section">
        <div class="info-title">使用说明</div>
        <div class="info-text">
            1. 访问脉脉招聘页面<br>
            2. 查看左下角的蓝色控制面板<br>
            3. 点击"提取当前人才"按钮<br>
            4. 添加备注并保存数据<br>
            5. 导出Excel文件
        </div>
    </div>
    
    <button class="button" id="open-maimai">访问脉脉招聘</button>
    <button class="button button-secondary" id="view-help">查看帮助</button>
    
    <div class="footer">
        <a href="#" class="footer-link" id="about-link">关于插件</a>
    </div>

    <script src="popup.js"></script>
</body>
</html>
