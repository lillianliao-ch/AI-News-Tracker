<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Boss职位发布助手</title>
  <style>
    body {
      width: 360px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
    }
    h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
      color: #333;
    }
    .upload-area {
      border: 2px dashed #00b38a;
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 16px;
    }
    .upload-area:hover {
      background: #f0fdf9;
      border-color: #059669;
    }
    .upload-area.has-file {
      background: #ecfdf5;
      border-color: #10b981;
    }
    input[type="file"] {
      display: none;
    }
    .file-info {
      margin-top: 8px;
      font-size: 14px;
      color: #059669;
    }
    .job-preview {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 16px;
      font-size: 13px;
    }
    .job-item {
      padding: 6px 8px;
      margin: 4px 0;
      background: #f9fafb;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn-primary {
      background: #00b38a;
      color: white;
    }
    .btn-primary:hover {
      background: #059669;
    }
    .btn-primary:disabled {
      background: #d1d5db;
      cursor: not-allowed;
    }
    .status {
      text-align: center;
      padding: 8px;
      font-size: 13px;
      color: #6b7280;
    }
    .status.success {
      color: #059669;
    }
    .status.error {
      color: #dc2626;
    }
  </style>
</head>
<body>
  <h2>📋 Boss职位发布助手</h2>
  
  <div class="upload-area" id="uploadArea">
    <div>📁 点击上传 Excel 文件</div>
    <div style="font-size: 12px; color: #6b7280; margin-top: 8px;">支持 .xlsx 格式</div>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div class="file-info" id="fileInfo"></div>
  </div>
  
  <div class="job-preview" id="jobPreview" style="display: none;">
    <div style="font-weight: 600; margin-bottom: 8px;">职位列表预览：</div>
    <div id="jobList"></div>
  </div>
  
  <button class="btn btn-primary" id="startBtn" disabled>
    🚀 开始自动发布
  </button>
  
  <div class="status" id="status">等待上传 Excel 文件...</div>
  
  <script src="libs/xlsx.full.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
