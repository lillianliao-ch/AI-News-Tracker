<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn-Atlas Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 350px;
            min-height: 400px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }

        .header {
            background: white;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #667eea;
        }

        .header h1 {
            font-size: 18px;
            color: #667eea;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            color: #666;
        }

        .content {
            padding: 20px;
            background: white;
        }

        .stats {
            background: #f8f9ff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .recent-candidates {
            margin-top: 15px;
        }

        .recent-title {
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin-bottom: 10px;
        }

        .candidate-item {
            background: #f8f9ff;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .candidate-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .candidate-info {
            color: #666;
            font-size: 11px;
        }

        .empty-state {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 13px;
        }

        .footer {
            background: white;
            padding: 12px 20px;
            text-align: center;
            border-top: 1px solid #e0e0e0;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-size: 12px;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🎯 LinkedIn-Atlas Analyzer</h1>
        <p>AI-Powered Candidate Analysis</p>
    </div>

    <div class="content">
        <div class="stats">
            <div class="stat-row">
                <span class="stat-label">Today's Analyses</span>
                <span class="stat-value" id="todayCount">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Total Candidates</span>
                <span class="stat-value" id="totalCount">0</span>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="analyzeCurrentBtn">
                <span>🎯</span>
                <span>Analyze Current Profile</span>
            </button>
            <button class="btn btn-primary" id="exportBtn">
                <span>📊</span>
                <span>Export Today's Excel</span>
            </button>
            <button class="btn btn-secondary" id="viewDataBtn">
                <span>📋</span>
                <span>View All Data</span>
            </button>
            <button class="btn btn-secondary" id="settingsBtn">
                <span>⚙️</span>
                <span>Settings</span>
            </button>
        </div>

        <div class="recent-candidates">
            <div class="recent-title">Recent Analyses</div>
            <div id="recentList"></div>
        </div>
    </div>

    <div class="footer">
        <a href="#" id="helpLink">Help & Documentation</a>
        <div id="status-footer"
            style="margin-top: 10px; font-size: 11px; color: #999; border-top: 1px solid #eee; padding-top: 5px;">
            Checking connection...
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
