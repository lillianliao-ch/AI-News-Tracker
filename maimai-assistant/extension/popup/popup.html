<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maimai Assistant</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-container">
        <header class="popup-header">
            <h1>🎯 Maimai Assistant</h1>
            <p class="subtitle">脉脉招聘助手</p>
        </header>

        <main class="popup-content">
            <section class="status-section">
                <div class="status-item">
                    <span class="label">状态</span>
                    <span class="value" id="statusText">就绪</span>
                </div>
            </section>

            <section class="stats-section">
                <div class="stat-card">
                    <div class="stat-number" id="todayCount">0</div>
                    <div class="stat-label">今日提取</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">总计</div>
                </div>
            </section>

            <section class="actions-section">
                <button class="action-btn primary" id="openMaimaiBtn">
                    打开脉脉招聘
                </button>
                <button class="action-btn" id="exportBtn">
                    导出数据
                </button>
                <button class="action-btn danger" id="clearBtn">
                    清除数据
                </button>
            </section>

            <section class="help-section">
                <h3>使用说明</h3>
                <ol>
                    <li>打开脉脉招聘页面</li>
                    <li>页面左下角会出现助手面板</li>
                    <li>勾选候选人后点击操作按钮</li>
                </ol>
            </section>

            <section class="settings-section" style="margin-top: 16px; padding: 12px 0 0; border-top: 1px solid #eee;">
                <h3 style="font-size: 13px; margin: 0 0 10px; color: #555;">⛙️ 服务器设置</h3>
                <div style="display: flex; gap: 6px; margin-bottom: 8px;">
                    <input
                        id="apiBaseInput"
                        type="text"
                        placeholder="http://192.168.1.100:8502"
                        style="flex: 1; padding: 6px 10px; font-size: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none;"
                    />
                    <button id="saveApiBtn"
                        style="padding: 6px 12px; font-size: 12px; background: #4a90d9; color: white; border: none; border-radius: 6px; cursor: pointer; white-space: nowrap;">
                        保存
                    </button>
                </div>
                <div id="apiStatus" style="font-size: 11px; color: #999; min-height: 16px;"></div>
            </section>
        </main>

        <footer class="popup-footer">
            <span>v1.0.0</span>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>

</html>
